<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议管理与分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<!-- Firebase SDK -->
<!-- Firebase SDK: 使用 jsdelivr CDN（国内可访问） -->
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1F4E79;--secondary:#2E75B6;--warning:#ED7D31;--success:#70AD47;--danger:#C00000;--bg:#F0F2F5;--card:#fff;--text:#333;--text-light:#666;--border:#E0E0E0;--shadow:0 2px 8px rgba(0,0,0,.08);--radius:8px}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(31,78,121,.3)}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.header-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.sync-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500}
.sync-badge.local{background:rgba(255,255,255,.2);color:#fff}
.sync-badge.cloud{background:rgba(112,173,71,.3);color:#E8F5E9}
.sync-badge .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.sync-badge.local .dot{background:#FFD700}
.sync-badge.cloud .dot{background:#70AD47}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;font-weight:500;white-space:nowrap}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}
.btn-primary{background:var(--secondary);color:#fff}
.btn-primary:hover{background:#2567a3}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#5f9a3c}
.btn-warning{background:var(--warning);color:#fff}
.btn-warning:hover{background:#d66e2b}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#a00000}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6)}
.btn-outline:hover{background:rgba(255,255,255,.15)}
.btn-sm{padding:5px 12px;font-size:12px}
.rank-period-btn{background:#E8EDF2;color:var(--text);border-radius:6px;transition:all .2s}
.rank-period-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(31,78,121,.3)}
.rank-period-btn:hover:not(.active){background:#D0D8E0}
.btn-icon{padding:6px 10px;font-size:14px}
.container{max-width:1400px;margin:0 auto;padding:20px}
.tab-bar{display:flex;gap:4px;background:var(--card);border-radius:var(--radius);padding:4px;margin-bottom:20px;box-shadow:var(--shadow)}
.tab-btn{flex:1;padding:12px 20px;border:none;background:transparent;border-radius:6px;font-size:15px;font-family:inherit;cursor:pointer;transition:all .2s;color:var(--text-light);font-weight:500}
.tab-btn.active{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(31,78,121,.3)}
.tab-btn:hover:not(.active){background:#E8EDF2}
.tab-content{display:none}
.tab-content.active{display:block}
.card{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.card-title{font-size:16px;font-weight:600;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #E8EDF2;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full-width{grid-column:1/-1}
.form-group label{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:4px}
.form-group label .required{color:var(--danger);font-size:14px}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s;background:#fff;color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--secondary);box-shadow:0 0 0 3px rgba(46,117,182,.12)}
.form-group input.error,.form-group select.error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(192,0,0,.1)}
.form-group input[readonly]{background:#F8F9FA;color:var(--text-light)}
.auto-calc-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px;padding:16px;background:#F8F9FA;border-radius:var(--radius);border:1px dashed #CED4DA}
.auto-item{display:flex;flex-direction:column;gap:4px}
.auto-item .label{font-size:11px;color:var(--text-light);font-weight:500}
.auto-item .value{font-size:15px;font-weight:700;color:var(--primary)}
.auto-item .value.bad{color:var(--danger)}
.auto-item .value.good{color:var(--success)}
.auto-item .value.warn{color:var(--warning)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.record-list{margin-top:20px}
.record-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;transition:all .2s;flex-wrap:wrap;gap:10px}
.record-item:hover{border-color:var(--secondary);box-shadow:0 2px 8px rgba(46,117,182,.1)}
.record-info{display:flex;flex-wrap:wrap;gap:6px 16px;flex:1;min-width:200px;align-items:center}
.record-tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500}
.tag-dept{background:#E8F0FE;color:var(--primary)}
.tag-overtime{background:#FFEBEE;color:var(--danger)}
.tag-ok{background:#E8F5E9;color:var(--success)}
.tag-score{background:#FFF3E0;color:#E65100}
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:20px}
.metric-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .2s}
.metric-card:hover{transform:translateY(-2px)}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.metric-card.good::before{background:var(--success)}
.metric-card.warn::before{background:var(--warning)}
.metric-card.bad::before{background:var(--danger)}
.metric-card.info::before{background:var(--secondary)}
.metric-label{font-size:13px;color:var(--text-light);margin-bottom:8px;font-weight:500}
.metric-value{font-size:32px;font-weight:700;line-height:1.2}
.metric-card.good .metric-value{color:var(--success)}
.metric-card.warn .metric-value{color:var(--warning)}
.metric-card.bad .metric-value{color:var(--danger)}
.metric-card.info .metric-value{color:var(--secondary)}
.metric-desc{font-size:12px;color:var(--text-light);margin-top:6px}
.metric-sub{display:flex;gap:16px;margin-top:4px;font-size:11px;color:var(--text-light);flex-wrap:wrap}
.chart-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:20px}
.chart-container{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.chart-container canvas{max-height:350px}
.filter-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.filter-bar .form-group{min-width:150px}
.filter-bar .form-group label{font-size:12px}
.filter-bar .form-group input,.filter-bar .form-group select{padding:7px 10px;font-size:13px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead{background:var(--primary);color:#fff}
.data-table th{padding:10px 12px;text-align:left;font-weight:500;white-space:nowrap}
.data-table td{padding:9px 12px;border-bottom:1px solid var(--border)}
.data-table tbody tr:hover{background:#F5F7FA}
.data-table tbody tr:nth-child(even){background:#FAFBFC}
.data-table tbody tr:nth-child(even):hover{background:#F0F2F5}
.rank-table{width:100%;border-collapse:collapse;font-size:13px}
.rank-table thead{background:var(--primary);color:#fff}
.rank-table th{padding:10px 14px;text-align:left;font-weight:500}
.rank-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.rank-table tbody tr:hover{background:#F5F7FA}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;color:#fff}
.rank-1{background:#FFD700;color:#333}
.rank-2{background:#C0C0C0;color:#333}
.rank-3{background:#CD7F32;color:#fff}
.rank-other{background:#E0E0E0;color:#666}
.progress-bar{height:8px;background:#E8EDF2;border-radius:4px;overflow:hidden;min-width:100px}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
.toast{position:fixed;top:80px;right:20px;padding:14px 24px;border-radius:8px;color:#fff;font-size:14px;font-weight:500;z-index:1000;transform:translateX(120%);transition:transform .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px}
.toast.show{transform:translateX(0)}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}
.toast-info{background:var(--secondary)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:15px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;max-width:600px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px;color:var(--primary)}
.modal p{font-size:13px;line-height:1.8;color:var(--text-light);margin-bottom:12px}
.modal code{background:#F0F2F5;padding:2px 6px;border-radius:3px;font-size:12px;color:var(--danger)}
.modal textarea{width:100%;min-height:200px;font-family:'Consolas','Courier New',monospace;font-size:12px;padding:12px;border:1px solid var(--border);border-radius:6px;resize:vertical}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
#fileInput{display:none}
@media(max-width:768px){
.header{padding:12px 16px}
.header h1{font-size:16px}
.container{padding:12px}
.tab-btn{padding:10px 12px;font-size:13px}
.form-grid{grid-template-columns:1fr}
.chart-row{grid-template-columns:1fr}
.dashboard-grid{grid-template-columns:repeat(2,1fr)}
.metric-value{font-size:24px}
.filter-bar{flex-direction:column}
.filter-bar .form-group{min-width:100%}
.card{padding:16px}
.data-table{font-size:12px}
.data-table th,.data-table td{padding:7px 8px}
.auto-calc-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){
.dashboard-grid{grid-template-columns:1fr}
.auto-calc-row{grid-template-columns:1fr}
.btn{padding:7px 12px;font-size:12px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>会议管理与分析系统</h1>
    <span id="syncBadge" class="sync-badge local"><span class="dot"></span> 本地模式</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline btn-sm" onclick="openFirebaseConfig()">同步状态</button>
    <button class="btn btn-outline btn-sm" onclick="exportJSON()">导出数据</button>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('fileInput').click()">导入数据</button>
    <button class="btn btn-success btn-sm" onclick="exportCSV()">导出CSV</button>
    <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
  </div>
</div>

<div class="container">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('record')">会议记录填写</button>
    <button class="tab-btn" onclick="switchTab('dashboard')">数据分析仪表盘</button>
  </div>

  <!-- Tab 1: 会议记录填写 -->
  <div id="tab-record" class="tab-content active">
    <div class="card">
      <div class="card-title">新增会议记录</div>
      <form id="meetingForm" onsubmit="return false;">
        <div class="form-grid">
          <div class="form-group">
            <label><span class="required">*</span> 会议主题</label>
            <input type="text" id="f_topic" placeholder="如：产品月度复盘" required>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 会议日期</label>
            <input type="date" id="f_date" required>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 主持人</label>
            <input type="text" id="f_host" placeholder="主持人姓名" required>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 记录人</label>
            <input type="text" id="f_recorder" placeholder="记录人姓名" required>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 所属部门</label>
            <select id="f_dept" required>
              <option value="">请选择部门</option>
              <option>总经办</option><option>销售中心</option><option>客服中心</option>
              <option>运营中心</option><option>品牌与营销中心</option><option>运作部</option>
              <option>产品部</option><option>技术部</option><option>财务部</option>
              <option>人事部</option>
            </select>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 计划时长（分钟）</label>
            <input type="number" id="f_planned" min="1" placeholder="计划会议时长" required oninput="calcAuto()">
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 实际时长（分钟）</label>
            <input type="number" id="f_actual" min="1" placeholder="实际会议时长" required oninput="calcAuto()">
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 是否提前发资料</label>
            <select id="f_material" required onchange="calcAuto()">
              <option value="">请选择</option><option value="是">是</option><option value="否">否</option>
            </select>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 会议纪要是否按时发出</label>
            <select id="f_minutes" required onchange="calcAuto()">
              <option value="">请选择</option><option value="是">是</option><option value="否">否</option>
            </select>
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 应参会人数</label>
            <input type="number" id="f_expected" min="1" placeholder="应到人数" required oninput="calcAuto()">
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 迟到人数</label>
            <input type="number" id="f_late" min="0" value="0" placeholder="迟到人数" required oninput="calcAuto()">
          </div>
          <div class="form-group">
            <label><span class="required">*</span> 缺席人数</label>
            <input type="number" id="f_absent" min="0" value="0" placeholder="缺席人数" required oninput="calcAuto()">
          </div>
        </div>

        <!-- Auto-calculated fields -->
        <div class="auto-calc-row" id="autoCalcRow">
          <div class="auto-item"><span class="label">是否超时</span><span class="value" id="autoOvertime">--</span></div>
          <div class="auto-item"><span class="label">是否按时结束（自动）</span><span class="value" id="autoEndOnTime">--</span></div>
          <div class="auto-item"><span class="label">实到人数</span><span class="value" id="autoActualAttend">--</span></div>
          <div class="auto-item"><span class="label">出席率</span><span class="value" id="autoAttendRate">--</span></div>
          <div class="auto-item"><span class="label">迟到率</span><span class="value" id="autoLateRate">--</span></div>
          <div class="auto-item"><span class="label">会议合规分</span><span class="value" id="autoCompliance">--</span></div>
          <div class="auto-item"><span class="label">会议效率分</span><span class="value" id="autoEfficiency">--</span></div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" onclick="resetForm()">重置表单</button>
          <button type="button" class="btn btn-success" onclick="submitForm()">提交记录</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-title">已提交记录 <span id="recordCount" style="font-size:13px;color:var(--text-light);font-weight:400;margin-left:8px"></span></div>
      <div id="recordList"></div>
    </div>
  </div>

  <!-- Tab 2: 数据分析仪表盘 -->
  <div id="tab-dashboard" class="tab-content">
    <div id="dashboardContent"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="modal-overlay">
  <div class="modal">
    <h3>确认删除</h3>
    <p>确定要删除这条会议记录吗？此操作不可撤销。</p>
    <div class="modal-actions">
      <button class="btn btn-sm" style="background:#999;color:#fff" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">确认删除</button>
    </div>
  </div>
</div>

<!-- 同步状态弹窗 -->
<div id="firebaseModal" class="modal-overlay">
  <div class="modal">
    <h3>云同步状态</h3>
    <p style="color:var(--success);font-size:14px;font-weight:600">Firebase 云同步已内置配置，无需手动设置。</p>
    <p style="font-size:13px;color:var(--text-light)">所有用户打开此页面即自动共享同一套数据。</p>
    <p id="syncStatusInfo" style="font-size:12px;background:#F8F9FA;padding:10px;border-radius:6px;word-break:break-all;margin-top:8px"></p>
    <div class="modal-actions">
      <button class="btn btn-sm" style="background:#999;color:#fff" onclick="closeFirebaseModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA LAYER - Firebase (cloud) + localStorage fallback
// ============================================================
// ============================================================
// Firebase 配置（硬编码，无需每个用户单独配置）
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD4dRbZG5TLBEhXG5ly6ycVkgc2HSz7GrE",
  authDomain: "meeting-system-2b88e.firebaseapp.com",
  databaseURL: "https://meeting-system-2b88e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "meeting-system-2b88e",
  storageBucket: "meeting-system-2b88e.firebasestorage.app",
  messagingSenderId: "640879877292",
  appId: "1:640879877292:web:9cedd926276d6374acd309"
};

const STORAGE_KEY = 'meeting_records_v2';
let firebaseApp = null;
let firebaseDb = null;
let useFirebase = false;
let deleteTargetId = null;
let chartInstances = {};

function initDataLayer() {
  try {
    firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
    firebaseDb = firebase.database();
    useFirebase = true;
    updateSyncBadge('cloud');
    console.log('Firebase 云同步已就绪');
  } catch(e) {
    console.warn('Firebase 初始化失败，降级为本地存储:', e.message);
    useFirebase = false;
    updateSyncBadge('local');
  }
}

function updateSyncBadge(mode) {
  const badge = document.getElementById('syncBadge');
  if (!badge) return;
  if (mode === 'cloud') {
    badge.className = 'sync-badge cloud';
    badge.innerHTML = '<span class="dot"></span> 云端同步';
  } else {
    badge.className = 'sync-badge local';
    badge.innerHTML = '<span class="dot"></span> 本地模式';
  }
}

// Firebase async operations
async function fbGetRecords() {
  try {
    const snapshot = await firebaseDb.ref('meeting_records').once('value');
    const data = snapshot.val() || {};
    return Object.keys(data).map(key => ({ ...data[key], id: key }));
  } catch(e) {
    console.error('Firebase getRecords error:', e);
    return getLocalRecords();
  }
}

async function fbAddRecord(record) {
  const { id, ...data } = record;
  await firebaseDb.ref('meeting_records/' + id).set(data);
}

async function fbRemoveRecord(id) {
  await firebaseDb.ref('meeting_records/' + id).remove();
}

// LocalStorage operations (fallback)
function getLocalRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}

function saveLocalRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

// Unified async API
async function getRecords() {
  if (useFirebase) return await fbGetRecords();
  return getLocalRecords();
}

async function addRecord(record) {
  if (useFirebase) {
    await fbAddRecord(record);
  } else {
    const records = getLocalRecords();
    records.unshift(record);
    saveLocalRecords(records);
  }
}

async function removeRecordById(id) {
  if (useFirebase) {
    await fbRemoveRecord(id);
  } else {
    let records = getLocalRecords();
    records = records.filter(r => r.id !== id);
    saveLocalRecords(records);
  }
}

async function bulkAddRecords(newRecords) {
  if (useFirebase) {
    for (const r of newRecords) {
      const { id, ...data } = r;
      await firebaseDb.ref('meeting_records/' + id).set(data);
    }
  } else {
    const existing = getLocalRecords();
    const existingIds = new Set(existing.map(r => r.id));
    const toAdd = newRecords.filter(r => !existingIds.has(r.id));
    saveLocalRecords([...toAdd, ...existing]);
  }
}

async function bulkSetRecords(records) {
  if (useFirebase) {
    await firebaseDb.ref('meeting_records').set(null);
    for (const r of records) {
      const { id, ...data } = r;
      await firebaseDb.ref('meeting_records/' + id).set(data);
    }
  } else {
    saveLocalRecords(records);
  }
}

// ============================================================
// COMPLIANCE & EFFICIENCY SCORING
// ============================================================
function calcComplianceScore(r) {
  let deductions = 0;
  const details = [];
  if (r.material === false || r.material === '否') { deductions += 15; details.push('未提前发资料(-15)'); }
  if (r.minutes === false || r.minutes === '否') { deductions += 15; details.push('纪要未按时发出(-15)'); }
  if (r.isOvertime) { deductions += 10; details.push('超时(-10)'); }
  if (r.endOnTime === false || r.endOnTime === '否') { deductions += 5; details.push('未按时结束(-5)'); }
  deductions += (r.lateCount || 0) * 2;
  if ((r.lateCount || 0) > 0) details.push('迟到' + r.lateCount + '人×2=(-' + (r.lateCount * 2) + ')');
  deductions += (r.absentCount || 0) * 3;
  if ((r.absentCount || 0) > 0) details.push('缺席' + r.absentCount + '人×3=(-' + (r.absentCount * 3) + ')');
  return { score: Math.max(0, 100 - deductions), deductions, details };
}

function calcEfficiencyScore(r, complianceScore) {
  // 规范执行 40%
  const normScore = (complianceScore / 100) * 40;

  // 时间控制 30%
  let timeScore;
  if (r.isOvertime) {
    const overtimeMinutes = r.actualDuration - r.plannedDuration;
    const overtimePenalty = Math.min(30, Math.floor(overtimeMinutes / 10) * 5);
    timeScore = Math.max(0, 30 - overtimePenalty);
  } else {
    timeScore = 30;
  }

  // 出勤纪律 20%
  const expected = r.expectedCount || 1;
  const actualAttend = (r.expectedCount || 0) - (r.absentCount || 0);
  const attendRate = actualAttend / Math.max(1, expected);
  const lateRate = (r.lateCount || 0) / Math.max(1, expected);
  const disciplineScore = (attendRate * 15) + ((1 - Math.min(1, lateRate)) * 5);

  // 议程执行 10%
  const executionScore = (r.endOnTime === true || r.endOnTime === '是') ? 10 : 5;

  const total = normScore + timeScore + disciplineScore + executionScore;
  return Math.round(total * 100) / 100;
}

// ============================================================
// AUTO CALCULATION (live preview in form)
// ============================================================
function calcAuto() {
  const planned = parseInt(document.getElementById('f_planned').value) || 0;
  const actual = parseInt(document.getElementById('f_actual').value) || 0;
  const expected = parseInt(document.getElementById('f_expected').value) || 0;
  const late = parseInt(document.getElementById('f_late').value) || 0;
  const absent = parseInt(document.getElementById('f_absent').value) || 0;
  const material = document.getElementById('f_material').value;
  const minutes = document.getElementById('f_minutes').value;
  const endOnTime = (planned > 0 && actual > 0) ? (actual <= planned ? '是' : '否') : '';

  // Build temp record for calculation
  const tempRecord = {
    plannedDuration: planned,
    actualDuration: actual,
    expectedCount: expected,
    lateCount: late,
    absentCount: absent,
    material: material,
    minutes: minutes,
    endOnTime: endOnTime,
    isOvertime: actual > planned && planned > 0
  };

  // 是否超时
  const otEl = document.getElementById('autoOvertime');
  if (planned > 0 && actual > 0) {
    otEl.textContent = actual > planned ? '是 (超' + (actual - planned) + '分钟)' : '否';
    otEl.className = 'value ' + (actual > planned ? 'bad' : 'good');
  } else {
    otEl.textContent = '--'; otEl.className = 'value';
  }

  // 是否按时结束（自动：实际时长 <= 计划时长）
  const eotEl = document.getElementById('autoEndOnTime');
  if (planned > 0 && actual > 0) {
    const onTime = actual <= planned;
    eotEl.textContent = onTime ? '是' : '否 (超' + (actual - planned) + '分钟)';
    eotEl.className = 'value ' + (onTime ? 'good' : 'bad');
  } else {
    eotEl.textContent = '--'; eotEl.className = 'value';
  }

  // 实到人数
  const aaEl = document.getElementById('autoActualAttend');
  if (expected > 0) {
    aaEl.textContent = expected - absent + ' 人';
    aaEl.className = 'value';
  } else {
    aaEl.textContent = '--'; aaEl.className = 'value';
  }

  // 出席率
  const arEl = document.getElementById('autoAttendRate');
  if (expected > 0) {
    const rate = ((expected - absent) / expected * 100).toFixed(1);
    arEl.textContent = rate + '%';
    arEl.className = 'value ' + (rate >= 90 ? 'good' : rate >= 70 ? 'warn' : 'bad');
  } else {
    arEl.textContent = '--'; arEl.className = 'value';
  }

  // 迟到率
  const lrEl = document.getElementById('autoLateRate');
  if (expected > 0) {
    const rate = (late / expected * 100).toFixed(1);
    lrEl.textContent = rate + '%';
    lrEl.className = 'value ' + (rate <= 10 ? 'good' : rate <= 30 ? 'warn' : 'bad');
  } else {
    lrEl.textContent = '--'; lrEl.className = 'value';
  }

  // 合规分
  const compEl = document.getElementById('autoCompliance');
  if (planned > 0 && actual > 0 && expected > 0 && material && minutes && endOnTime) {
    const comp = calcComplianceScore(tempRecord);
    compEl.textContent = comp.score + ' 分';
    compEl.className = 'value ' + (comp.score >= 90 ? 'good' : comp.score >= 70 ? 'warn' : 'bad');
  } else {
    compEl.textContent = '--'; compEl.className = 'value';
  }

  // 效率分
  const effEl = document.getElementById('autoEfficiency');
  if (planned > 0 && actual > 0 && expected > 0 && material && minutes && endOnTime) {
    const comp = calcComplianceScore(tempRecord);
    const eff = calcEfficiencyScore(tempRecord, comp.score);
    effEl.textContent = eff.toFixed(1) + ' 分';
    effEl.className = 'value ' + (eff >= 90 ? 'good' : eff >= 70 ? 'warn' : 'bad');
  } else {
    effEl.textContent = '--'; effEl.className = 'value';
  }
}

async function submitForm() {
  const fields = [
    { id: 'f_topic', name: '会议主题' },
    { id: 'f_date', name: '会议日期' },
    { id: 'f_host', name: '主持人' },
    { id: 'f_recorder', name: '记录人' },
    { id: 'f_dept', name: '所属部门' },
    { id: 'f_planned', name: '计划时长' },
    { id: 'f_actual', name: '实际时长' },
    { id: 'f_material', name: '是否提前发资料' },
    { id: 'f_minutes', name: '纪要是否按时发出' },
    { id: 'f_expected', name: '应参会人数' },
    { id: 'f_late', name: '迟到人数' },
    { id: 'f_absent', name: '缺席人数' }
  ];

  let valid = true;
  fields.forEach(f => {
    const el = document.getElementById(f.id);
    if (!el.value || (el.tagName === 'SELECT' && el.value === '')) {
      el.classList.add('error');
      valid = false;
    } else {
      el.classList.remove('error');
    }
  });

  // Validation: 缺席人数 must be < 应参会人数
  const expected = parseInt(document.getElementById('f_expected').value) || 0;
  const absent = parseInt(document.getElementById('f_absent').value) || 0;
  if (absent >= expected && expected > 0) {
    document.getElementById('f_absent').classList.add('error');
    showToast('缺席人数不能大于或等于应参会人数', 'error');
    valid = false;
  }
  // Validation: 迟到人数 must be <= 应参会人数
  const late = parseInt(document.getElementById('f_late').value) || 0;
  if (late > expected && expected > 0) {
    document.getElementById('f_late').classList.add('error');
    showToast('迟到人数不能大于应参会人数', 'error');
    valid = false;
  }

  if (!valid) {
    showToast('请填写所有必填项', 'error');
    return;
  }

  const planned = parseInt(document.getElementById('f_planned').value);
  const actual = parseInt(document.getElementById('f_actual').value);

  const record = {
    id: genId(),
    topic: document.getElementById('f_topic').value.trim(),
    date: document.getElementById('f_date').value,
    host: document.getElementById('f_host').value.trim(),
    recorder: document.getElementById('f_recorder').value.trim(),
    dept: document.getElementById('f_dept').value,
    plannedDuration: planned,
    actualDuration: actual,
    material: document.getElementById('f_material').value,
    minutes: document.getElementById('f_minutes').value,
    expectedCount: expected,
    lateCount: late,
    absentCount: absent,
    endOnTime: actual <= planned ? '是' : '否',
    isOvertime: actual > planned,
    createdAt: new Date().toISOString()
  };

  // Calculate scores
  const comp = calcComplianceScore(record);
  record.complianceScore = comp.score;
  record.efficiencyScore = calcEfficiencyScore(record, comp.score);
  record.actualAttend = expected - absent;
  record.attendRate = expected > 0 ? ((expected - absent) / expected * 100) : 0;
  record.lateRate = expected > 0 ? (late / expected * 100) : 0;

  await addRecord(record);
  showToast('会议记录提交成功', 'success');
  resetForm();
  await renderRecordList();
}

function resetForm() {
  document.getElementById('meetingForm').reset();
  document.getElementById('f_late').value = '0';
  document.getElementById('f_absent').value = '0';
  document.getElementById('f_date').value = formatDate(new Date());

}

async function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      const dataArray = Array.isArray(imported) ? imported : [imported];
      
      const records = dataArray.map(item => {
        const planned = item.plannedDuration || 0;
        const actual = item.actualDuration || 0;
        const expected = item.expectedCount || 0;
        const late = item.lateCount || 0;
        const absent = item.absentCount || 0;
        
        const record = {
          id: item.id || genId(),
          topic: item.topic || '',
          date: item.date || '',
          host: item.host || '',
          recorder: item.recorder || '',
          dept: item.dept || '',
          plannedDuration: planned,
          actualDuration: actual,
          material: item.material || '是',
          minutes: item.minutes || '是',
          expectedCount: expected,
          lateCount: late,
          absentCount: absent,
          endOnTime: item.endOnTime || '是',
          isOvertime: actual > planned && planned > 0,
          createdAt: item.createdAt || new Date().toISOString()
        };
        
        const comp = calcComplianceScore(record);
        record.complianceScore = comp.score;
        record.efficiencyScore = calcEfficiencyScore(record, comp.score);
        record.actualAttend = expected - absent;
        record.attendRate = expected > 0 ? ((expected - absent) / expected * 100) : 0;
        record.lateRate = expected > 0 ? (late / expected * 100) : 0;
        
        return record;
      });
      
      const existing = await getRecords();
      const existingIds = new Set(existing.map(r => r.id));
      const newRecords = records.filter(r => !existingIds.has(r.id));
      
      await bulkAddRecords(newRecords);
      await renderRecordList();
      showToast('成功导入 ' + newRecords.length + ' 条新记录（跳过 ' + (records.length - newRecords.length) + ' 条重复）', 'success');
    } catch(err) {
      showToast('导入失败：文件格式不正确', 'error');
      console.error(err);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

async function exportCSV() {
  const records = await getRecords();
  if (records.length === 0) { showToast('暂无数据可导出', 'error'); return; }
  
  const headers = [
    '会议主题','会议日期','主持人','记录人','所属部门','计划时长(分钟)','实际时长(分钟)',
    '是否提前发资料','纪要是否按时发出','应参会人数','迟到人数','缺席人数',
    '是否按时结束','是否超时','实到人数','出席率(%)','迟到率(%)','合规分','效率分'
  ];
  
  const rows = records.map(r => [
    r.topic, r.date, r.host, r.recorder, r.dept, r.plannedDuration, r.actualDuration,
    r.material, r.minutes, r.expectedCount, r.lateCount, r.absentCount,
    r.endOnTime, r.isOvertime ? '是' : '否', r.actualAttend,
    (r.attendRate || 0).toFixed(1), (r.lateRate || 0).toFixed(1),
    r.complianceScore || 0, (r.efficiencyScore || 0).toFixed(1)
  ].map(v => '"' + String(v !== undefined && v !== null ? v : '').replace(/"/g, '""') + '"').join(','));

  const bom = '\uFEFF';
  const csv = bom + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, '会议数据_' + formatDate(new Date()) + '.csv');
  showToast('CSV导出成功', 'success');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

  html += buildMetricCard('总会议数', total + ' 次', '共涉及 ' + new Set(records.map(r => r.dept)).size + ' 个部门', 'info', false);
  html += buildMetricCard('平均效率分', avgEfficiency.toFixed(1) + ' 分', '满分100分 | 合规优秀率 ' + complianceExcellentRate.toFixed(1) + '%', getLevel(avgEfficiency, [80, 60]), false);
  html += buildMetricCard('超时率', overtimeRate.toFixed(1) + '%', overtimeCount + '/' + total + ' 场超时 | 浪费 ' + wasteMinutes + ' 分钟', getLevel(100 - overtimeRate, [70, 50]), true);
  html += buildMetricCard('平均合规分', avgCompliance.toFixed(1) + ' 分', '资料准备率 ' + materialRate.toFixed(1) + '% | 纪要及时率 ' + minutesRate.toFixed(1) + '%', getLevel(avgCompliance, [80, 60]), false);
  html += '</div>';

  // --- More detail cards ---
  html += '<div class="dashboard-grid">';
  html += buildMetricCard('平均出席率', avgAttendRate.toFixed(1) + '%', '参会总人次 ' + totalAttendees + ' | 缺席总人次 ' + totalAbsent, getLevel(avgAttendRate, [90, 75]), false);
  html += buildMetricCard('按时结束率', endOnTimeRate.toFixed(1) + '%', endOnTimeCount + '/' + total + ' 场按时结束', getLevel(endOnTimeRate, [80, 60]), false);
  html += buildMetricCard('平均迟到率', avgLateRate.toFixed(1) + '%', '迟到总人次 ' + totalLate, getLevel(100 - avgLateRate, [90, 75]), true);
  html += buildMetricCard('平均计划时长', avgPlanned.toFixed(0) + ' / ' + avgActual.toFixed(0) + ' 分钟', '计划vs实际 | 会议数 ' + total, 'info', false);
  html += '</div>';

  // --- Charts Row 1: 部门效率排名 + 合规分分布 ---
  html += '<div class="chart-row">';
  html += '<div class="chart-container"><div class="card-title">部门效率排名</div><canvas id="chartDeptEfficiency"></canvas></div>';
  html += '<div class="chart-container"><div class="card-title">合规分分布</div><canvas id="chartComplianceDist"></canvas></div>';
  html += '</div>';

  // --- Charts Row 2: 月度趋势 ---
  html += '<div class="chart-row">';
  html += '<div class="chart-container" style="grid-column:1/-1"><div class="card-title">月度趋势</div><canvas id="chartMonthlyTrend" style="max-height:300px"></canvas></div>';
  html += '</div>';

  // --- Data Table with Filters ---
  html += '<div class="card">';
  html += '<div class="card-title">数据汇总表</div>';
  html += '<div class="filter-bar">';
  html += '<div class="form-group"><label>部门筛选</label><select id="filterDept" onchange="renderDataTable()"><option value="">全部部门</option>';
  const depts = [...new Set(records.map(r => r.dept).filter(Boolean))].sort();
  depts.forEach(d => html += '<option value="' + esc(d) + '">' + esc(d) + '</option>');
  html += '</select></div>';
  html += '<div class="form-group"><label>开始日期</label><input type="date" id="filterDateFrom" onchange="renderDataTable()"></div>';
  html += '<div class="form-group"><label>结束日期</label><input type="date" id="filterDateTo" onchange="renderDataTable()"></div>';
  html += '<div class="form-group"><label>&nbsp;</label><button class="btn btn-primary btn-sm" onclick="clearFilters()">清除筛选</button></div>';
  html += '</div>';
  html += '<div style="overflow-x:auto"><table class="data-table" id="dataTable"><thead><tr>';
  html += '<th>主题</th><th>部门</th><th>日期</th><th>主持人</th><th>实际/计划(分钟)</th><th>超时</th><th>出席率</th><th>迟到率</th><th>合规分</th><th>效率分</th>';
  html += '</tr></thead><tbody id="dataTableBody"></tbody></table></div>';
  html += '</div>';

  container.innerHTML = html;

  // Render charts and ranking
  currentRankPeriod = 'all';
  window._allRecords = records;
  await renderRankTable(records, 'all');
  await renderDeptEfficiencyChart(records);
  await renderComplianceDistChart(records);
  await renderMonthlyTrendChart(records);
  await renderDataTable();
}

function buildMetricCard(label, value, desc, level, inverse) {
  return '<div class="metric-card ' + level + '">' +
    '<div class="metric-label">' + label + '</div>' +
    '<div class="metric-value">' + value + '</div>' +
    '<div class="metric-desc">' + desc + '</div></div>';
}

async function renderDeptEfficiencyChart(records) {
  const deptMap = {};
  records.forEach(r => {
    if (!deptMap[r.dept]) deptMap[r.dept] = [];
    deptMap[r.dept].push(r);
  });

  const entries = Object.entries(deptMap).map(([dept, dr]) => {
    const avgEff = dr.reduce((s, r) => s + (r.efficiencyScore || 0), 0) / dr.length;
    return { dept, avgEff, count: dr.length };
  });
  entries.sort((a, b) => b.avgEff - a.avgEff);

  const ctx = document.getElementById('chartDeptEfficiency');
  if (!ctx) return;
  chartInstances.deptEfficiency = new Chart(ctx.getContext('2d'), {
    type: 'bar',
    data: {
      labels: entries.map(e => e.dept),
      datasets: [{
        label: '平均效率分',
        data: entries.map(e => e.avgEff),
        backgroundColor: entries.map(e => e.avgEff >= 85 ? 'rgba(112,173,71,0.7)' : e.avgEff >= 70 ? 'rgba(237,125,49,0.7)' : 'rgba(192,0,0,0.7)'),
        borderRadius: 4,
        borderWidth: 0
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, max: 100, ticks: { callback: v => v + ' 分' } }
      }
    }
  });
}

async function renderComplianceDistChart(records) {
  const ranges = { '90-100分(优秀)': 0, '80-89分(良好)': 0, '70-79分(一般)': 0, '60-69分(较差)': 0, '60分以下(差)': 0 };
  records.forEach(r => {
    const s = r.complianceScore || 0;
    if (s >= 90) ranges['90-100分(优秀)']++;
    else if (s >= 80) ranges['80-89分(良好)']++;
    else if (s >= 70) ranges['70-79分(一般)']++;
    else if (s >= 60) ranges['60-69分(较差)']++;
    else ranges['60分以下(差)']++;
  });
  
  const labels = Object.keys(ranges);
  const data = Object.values(ranges);
  const colors = ['#70AD47','#2E75B6','#FFC000','#ED7D31','#C00000'];

  const ctx = document.getElementById('chartComplianceDist');
  if (!ctx) return;
  chartInstances.complianceDist = new Chart(ctx.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 12, family: "'Microsoft YaHei'" }, padding: 10 } }
      }
    }
  });
}

async function renderMonthlyTrendChart(records) {
  const monthMap = {};
  records.forEach(r => {
    if (!r.date) return;
    const month = r.date.substring(0, 7);
    if (!monthMap[month]) monthMap[month] = { records: [], total: 0, overtime: 0, sumEff: 0, sumComp: 0 };
    monthMap[month].records.push(r);
    monthMap[month].total++;
    if (r.isOvertime) monthMap[month].overtime++;
    monthMap[month].sumEff += (r.efficiencyScore || 0);
    monthMap[month].sumComp += (r.complianceScore || 0);
  });

  const months = Object.keys(monthMap).sort();
  const overtimeRates = months.map(m => monthMap[m].total > 0 ? (monthMap[m].overtime / monthMap[m].total * 100) : 0);
  const avgCompliance = months.map(m => monthMap[m].total > 0 ? (monthMap[m].sumComp / monthMap[m].total) : 0);
  const avgEfficiency = months.map(m => monthMap[m].total > 0 ? (monthMap[m].sumEff / monthMap[m].total) : 0);

  const ctx = document.getElementById('chartMonthlyTrend');
  if (!ctx) return;
  chartInstances.monthlyTrend = new Chart(ctx.getContext('2d'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        {
          label: '超时率(%)',
          data: overtimeRates,
          borderColor: '#C00000',
          backgroundColor: 'rgba(192,0,0,0.05)',
          fill: false,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#C00000',
          yAxisID: 'y'
        },
        {
          label: '平均合规分',
          data: avgCompliance,
          borderColor: '#2E75B6',
          backgroundColor: 'rgba(46,117,182,0.05)',
          fill: false,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#2E75B6',
          borderDash: [5, 5],
          yAxisID: 'y1'
        },
        {
          label: '平均效率分',
          data: avgEfficiency,
          borderColor: '#70AD47',
          backgroundColor: 'rgba(112,173,71,0.05)',
          fill: false,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: '#70AD47',
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { font: { size: 12, family: "'Microsoft YaHei'" }, usePointStyle: true } } },
      scales: {
        y: { type: 'linear', position: 'left', beginAtZero: true, max: 100, ticks: { callback: v => v + '%' }, title: { display: true, text: '超时率' } },
        y1: { type: 'linear', position: 'right', beginAtZero: false, min: 0, max: 100, ticks: { callback: v => v + '分' }, title: { display: true, text: '评分' }, grid: { drawOnChartArea: false } }
      }
    }
  });
}

async function renderRankTable(records, period) {
  // Filter records by time period
  let filtered = filterByPeriod(records, period);
  
  const deptMap = {};
  filtered.forEach(r => {
    if (!deptMap[r.dept]) deptMap[r.dept] = [];
    deptMap[r.dept].push(r);
  });

  const rankings = Object.entries(deptMap).map(([dept, dr]) => {
    const total = dr.length;
    const avgEff = dr.reduce((s, r) => s + (r.efficiencyScore || 0), 0) / total;
    const avgComp = dr.reduce((s, r) => s + (r.complianceScore || 0), 0) / total;
    const overtimeCount = dr.filter(r => r.isOvertime).length;
    const overtimeRate = total > 0 ? (overtimeCount / total * 100) : 0;
    // 综合得分 = 效率分占60% + 合规分占40%  （效率是执行质量，合规是流程质量）
    const compositeScore = avgEff * 0.6 + avgComp * 0.4;
    return { dept, total, avgEff, avgComp, overtimeRate, compositeScore };
  });
  rankings.sort((a, b) => b.compositeScore - a.compositeScore);

  const container = document.getElementById('rankTableContainer');
  if (!container) return;

  if (rankings.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:30px"><p>该时间段暂无数据</p></div>';
    return;
  }

  let html = '<table class="rank-table"><thead><tr><th>排名</th><th>部门</th><th>会议数</th><th>综合得分</th><th>得分条</th><th>平均效率分</th><th>平均合规分</th><th>超时率</th></tr></thead><tbody>';
  rankings.forEach((r, i) => {
    const rankClass = i < 3 ? 'rank-' + (i + 1) : 'rank-other';
    const compBarColor = r.compositeScore >= 90 ? 'var(--success)' : r.compositeScore >= 75 ? 'var(--warning)' : 'var(--danger)';
    const compColor = r.compositeScore >= 90 ? 'var(--success)' : r.compositeScore >= 75 ? 'var(--warning)' : 'var(--danger)';
    html += '<tr>';
    html += '<td><span class="rank-badge ' + rankClass + '">' + (i + 1) + '</span></td>';
    html += '<td style="font-weight:600">' + esc(r.dept) + '</td>';
    html += '<td>' + r.total + '</td>';
    html += '<td style="font-weight:700;color:' + compColor + ';font-size:16px">' + r.compositeScore.toFixed(1) + '</td>';
    html += '<td><div class="progress-bar"><div class="progress-fill" style="width:' + r.compositeScore + '%;background:' + compBarColor + '"></div></div></td>';
    html += '<td>' + r.avgEff.toFixed(1) + '</td>';
    html += '<td>' + r.avgComp.toFixed(1) + '</td>';
    html += '<td style="color:' + (r.overtimeRate > 50 ? 'var(--danger)' : 'var(--text)') + '">' + r.overtimeRate.toFixed(1) + '%</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

// ============================================================
// TIME PERIOD FILTER FOR RANKING
// ============================================================
let currentRankPeriod = 'all';

function filterByPeriod(records, period) {
  if (!period || period === 'all') return records;
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;

  return records.filter(r => {
    if (!r.date) return false;
    const parts = r.date.split('-');
    if (parts.length < 2) return false;
    const rYear = parseInt(parts[0]);
    const rMonth = parseInt(parts[1]);

    switch (period) {
      case 'month':
        return rYear === year && rMonth === month;
      case 'quarter':
        const qStartMonth = Math.floor((month - 1) / 3) * 3 + 1;
        const qEndMonth = qStartMonth + 2;
        return rYear === year && rMonth >= qStartMonth && rMonth <= qEndMonth;
      case 'half':
        const hStart = month <= 6 ? 1 : 7;
        const hEnd = month <= 6 ? 6 : 12;
        return rYear === year && rMonth >= hStart && rMonth <= hEnd;
      case 'year':
        return rYear === year;
      default:
        return true;
    }
  });
}

function switchRankPeriod(period) {
  currentRankPeriod = period;
  
  // Update button styles
  document.querySelectorAll('.rank-period-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-period') === period);
  });
  
  // Update period label
  const labels = { month: '当前月度', quarter: '当前季度', half: '当前半年度', year: '当前年度' };
  const label = document.getElementById('rankPeriodLabel');
  if (label) {
    label.textContent = '当前：' + (labels[period] || '全部数据');
  }

  // Re-render ranking with filtered data
  if (window._allRecords) {
    renderRankTable(window._allRecords, period);
  }
}

async function renderDataTable() {
  const records = await getRecords();
  const deptFilter = document.getElementById('filterDept') ? document.getElementById('filterDept').value : '';
  const dateFrom = document.getElementById('filterDateFrom') ? document.getElementById('filterDateFrom').value : '';
  const dateTo = document.getElementById('filterDateTo') ? document.getElementById('filterDateTo').value : '';

  let filtered = records;
  if (deptFilter) filtered = filtered.filter(r => r.dept === deptFilter);
  if (dateFrom) filtered = filtered.filter(r => r.date >= dateFrom);
  if (dateTo) filtered = filtered.filter(r => r.date <= dateTo);

  const tbody = document.getElementById('dataTableBody');
  if (!tbody) return;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-light);padding:30px">无匹配数据</td></tr>';
    return;
  }

  let html = '';
  filtered.forEach(r => {
    const compColor = (r.complianceScore || 0) >= 90 ? 'var(--success)' : (r.complianceScore || 0) >= 70 ? 'var(--warning)' : 'var(--danger)';
    const effColor = (r.efficiencyScore || 0) >= 85 ? 'var(--success)' : (r.efficiencyScore || 0) >= 70 ? 'var(--warning)' : 'var(--danger)';
    html += '<tr>';
    html += '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(r.topic) + '">' + esc(r.topic) + '</td>';
    html += '<td>' + esc(r.dept) + '</td>';
    html += '<td>' + (r.date || '') + '</td>';
    html += '<td>' + esc(r.host) + '</td>';
    html += '<td>' + (r.actualDuration || 0) + ' / ' + (r.plannedDuration || 0) + '</td>';
    html += '<td style="color:' + (r.isOvertime ? 'var(--danger)' : 'var(--success)') + ';font-weight:600">' + (r.isOvertime ? '是' : '否') + '</td>';
    html += '<td>' + (r.attendRate || 0).toFixed(1) + '%</td>';
    html += '<td>' + (r.lateRate || 0).toFixed(1) + '%</td>';
    html += '<td style="font-weight:600;color:' + compColor + '">' + (r.complianceScore || 0) + '</td>';
    html += '<td style="font-weight:600;color:' + effColor + '">' + (r.efficiencyScore || 0).toFixed(1) + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function clearFilters() {
  if (document.getElementById('filterDept')) document.getElementById('filterDept').value = '';
  if (document.getElementById('filterDateFrom')) document.getElementById('filterDateFrom').value = '';
  if (document.getElementById('filterDateTo')) document.getElementById('filterDateTo').value = '';
  renderDataTable();
}
